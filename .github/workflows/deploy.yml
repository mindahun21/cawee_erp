              bash update.sh
              echo "✅ Petco deployment successful"
            else
              git merge --abort
              git stash pop
              echo "❌ Merge conflict detected in Petco repo"
              exit 1
            fi

  deploy-svo:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to SVO Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SVO_SSH_HOST }}
          username: ${{ secrets.SVO_SSH_USER }}
          key: ${{ secrets.SVO_SSH_KEY }}
          script: |
            cd /opt/svo_erp
            
            git config user.email "ci@elisoft.com"
            git config user.name "Elisoft CI"
            git stash
            git fetch upstream deploy
            
            if git merge --no-commit --no-ff upstream/deploy; then
              git commit -m "chore: sync upstream $(date +%Y-%m-%d_%H:%M:%S)" || true
              git stash pop
              bash docker/update.sh
              echo "✅ SVO deployment successful"
            else
              git merge --abort
              git stash pop
              echo "❌ Merge conflict detected in SVO repo"
              exit 1
            fi
