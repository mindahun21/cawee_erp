services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: elisofterp-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
      - redis
      - vector_db
    networks:
      - elisoft-network

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - elisoft-network

  queue:
    image: elisofterp-app
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --tries=1 --timeout=0
    volumes:
      - ./:/var/www
    depends_on:
      - redis
      - db
    networks:
      - elisoft-network

  cron:
    image: elisofterp-app
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    volumes:
      - ./:/var/www
    depends_on:
      - redis
      - db
    networks:
      - elisoft-network

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: elisoft_erp
      MYSQL_USER: elisoft_user
      MYSQL_PASSWORD: user_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - elisoft-network

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - elisoft-network

  vector_db:
    image: ankane/pgvector:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: elisoft_vectors
      POSTGRES_USER: vector_user
      POSTGRES_PASSWORD: vector_password
    volumes:
      - vector-db-data:/var/lib/postgresql/data
    networks:
      - elisoft-network

networks:
  elisoft-network:
    driver: bridge

volumes:
  db-data:
  redis-data:
  vector-db-data:
