services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: elisofterp-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
      - redis
      - vector_db
    networks:
      - elisoft-network

  web:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.elisoft.rule=Host(`erp-elisoft.elisoftsolution.com`)"

      - "traefik.http.routers.elisoft.entrypoints=websecure"
      - "traefik.http.routers.elisoft.tls.certresolver=letsencrypt"
      - "traefik.http.services.elisoft.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-public"
    networks:
      - elisoft-network
      - traefik-public

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --tries=1 --timeout=0
    volumes:
      - ./:/var/www
    depends_on:
      - redis
      - db
    networks:
      - elisoft-network

  cron:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    volumes:
      - ./:/var/www
    depends_on:
      - redis
      - db
    networks:
      - elisoft-network

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: elisoft_erp
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - elisoft-network

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - elisoft-network

  vector_db:
    image: ankane/pgvector:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${VECTOR_DB_DATABASE:-elisoft_vectors}
      POSTGRES_USER: ${VECTOR_DB_USERNAME:-vector_user}
      POSTGRES_PASSWORD: ${VECTOR_DB_PASSWORD:-vector_password}
    volumes:
      - vector-db-data:/var/lib/postgresql/data
    networks:
      - elisoft-network

networks:
  elisoft-network:
    driver: bridge
  traefik-public:
    external: true

volumes:
  db-data:
  redis-data:
  vector-db-data:
